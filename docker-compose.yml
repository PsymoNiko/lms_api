
services:
  db:
    image: postgres:16
    container_name: lms_db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: lms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lms_network

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.76
    container_name: lms_rustfs
    restart: always
    ports:
      - "9000:9000" # API Port (S3 compatible)
      - "9001:9001" # Console/Dashboard Port
    environment:
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=minioadminioadminmin
      - RUSTFS_SECRET_KEY=minioadmin123
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/app/logs
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:9000/health && curl -f http://localhost:9001/rustfs/console/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lms_network

volumes:
  postgres_data:
  rustfs_data:
  rustfs_logs:

networks:
  lsm_network:
  name: lms_network